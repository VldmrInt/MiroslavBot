services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_PROXY_URL=${BOT_PROXY_URL:-}
    volumes:
      - ./data:/app/data
      - ./proxies:/app/proxies
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
